<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактирование упражнения — FitApp</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/edit-exercise.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebarClose" aria-label="Закрыть меню">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <a href="index.html" class="sidebar-logo">FitApp</a>
    <nav class="sidebar-nav">
      <a href="profile.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Профиль
      </a>
      <a href="exercises.html" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6.5 6.5h11M6.5 17.5h11M3 12h3M18 12h3M6 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM18 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
        </svg>
        Упражнения
      </a>
      <a href="user-programs.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        Программы пользователей
      </a>
      <a href="my-programs.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        Ваши программы
      </a>
    </nav>
  </aside>

  <!-- Mobile Menu Toggle -->
  <button class="menu-toggle" id="menuToggle" aria-label="Меню">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Main Content -->
  <main class="main-content main-with-sidebar">
    <!-- Page Header -->
    <div class="page-header edit-header">
      <div class="edit-header-left">
        <a href="exercises.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Назад к упражнениям
        </a>
        <h1 class="page-title">Редактирование упражнения</h1>
      </div>
      <div class="edit-header-actions">
        <button class="btn btn-outline" onclick="window.location.href='exercises.html'">Отмена</button>
        <button class="btn btn-primary" id="saveBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Сохранить
        </button>
      </div>
    </div>

    <!-- Edit Form -->
    <div class="edit-container">
      <div class="edit-card">
        <form id="editExerciseForm">
          <!-- Name -->
          <div class="form-group">
            <label class="form-label">Название упражнения</label>
            <input type="text" class="form-input" id="exerciseName" value="Жим лёжа" placeholder="Введите название упражнения">
          </div>

          <!-- Equipment -->
          <div class="form-group">
            <label class="form-label">Оборудование</label>
            <div class="selector-grid" id="equipmentSelector">
              <div class="selector-item">
                <input type="radio" name="equipment" value="barbell" id="eq-barbell" checked>
                <label for="eq-barbell">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="10" width="20" height="4" rx="1"/>
                    <rect x="1" y="11" width="3" height="2" rx="0.5"/>
                    <rect x="20" y="11" width="3" height="2" rx="0.5"/>
                  </svg>
                  <span class="item-name">Штанга</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="equipment" value="dumbbells" id="eq-dumbbells">
                <label for="eq-dumbbells">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="4" y="8" width="16" height="8" rx="1"/>
                    <rect x="2" y="10" width="3" height="4" rx="0.5"/>
                    <rect x="19" y="10" width="3" height="4" rx="0.5"/>
                  </svg>
                  <span class="item-name">Гантели</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="equipment" value="kettlebell" id="eq-kettlebell">
                <label for="eq-kettlebell">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="14" r="6"/>
                    <path d="M9 8h6M10 5h4M12 2v3"/>
                  </svg>
                  <span class="item-name">Гиря</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="equipment" value="pullup-bar" id="eq-pullup-bar">
                <label for="eq-pullup-bar">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 6h16M4 6v2M20 6v2M4 8v2M20 8v2M8 8v10M16 8v10M8 18h8"/>
                  </svg>
                  <span class="item-name">Турник</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="equipment" value="bodyweight" id="eq-bodyweight">
                <label for="eq-bodyweight">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="5" r="3"/>
                    <line x1="12" y1="8" x2="12" y2="20"/>
                    <path d="M8 11h8"/>
                  </svg>
                  <span class="item-name">Свой вес</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="equipment" value="cable" id="eq-cable">
                <label for="eq-cable">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M12 8v8M8 12h8"/>
                  </svg>
                  <span class="item-name">Трос</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="equipment" value="machine" id="eq-machine">
                <label for="eq-machine">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                  </svg>
                  <span class="item-name">Тренажёр</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Primary Muscle -->
          <div class="form-group">
            <label class="form-label">Основная мышца</label>
            <div class="selector-grid" id="primaryMuscleSelector">
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="chest" id="prim-chest" checked>
                <label for="prim-chest">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 4c-3 0-6 2-6 6v6c0 2 1 4 6 4s6-2 6-4v-6c0-4-3-6-6-6z"/>
                  </svg>
                  <span class="item-name">Грудные</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="back" id="prim-back">
                <label for="prim-back">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2v20M4 6h16M4 10h16M4 14h16M4 18h16"/>
                  </svg>
                  <span class="item-name">Спина</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="shoulders" id="prim-shoulders">
                <label for="prim-shoulders">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="6" r="4"/>
                    <path d="M4 20h16M8 14l4-4 4 4"/>
                  </svg>
                  <span class="item-name">Плечи</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="biceps" id="prim-biceps">
                <label for="prim-biceps">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="12" rx="6" ry="3"/>
                    <path d="M6 12v4c0 2 2.69 4 6 4s6-2 6-4v-4"/>
                  </svg>
                  <span class="item-name">Бицепс</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="triceps" id="prim-triceps">
                <label for="prim-triceps">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="12" rx="6" ry="3"/>
                    <path d="M6 8v8c0 2 2.69 4 6 4s6-2 6-4V8"/>
                  </svg>
                  <span class="item-name">Трицепс</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="legs" id="prim-legs">
                <label for="prim-legs">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="6" r="2"/>
                    <circle cx="16" cy="6" r="2"/>
                    <line x1="8" y1="8" x2="8" y2="20"/>
                    <line x1="16" y1="8" x2="16" y2="20"/>
                  </svg>
                  <span class="item-name">Ноги</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="core" id="prim-core">
                <label for="prim-core">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="6" y="4" width="12" height="16" rx="2"/>
                    <line x1="6" y1="8" x2="18" y2="8"/>
                    <line x1="6" y1="12" x2="18" y2="12"/>
                    <line x1="6" y1="16" x2="18" y2="16"/>
                  </svg>
                  <span class="item-name">Пресс</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="radio" name="primary-muscle" value="glutes" id="prim-glutes">
                <label for="prim-glutes">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="12" rx="8" ry="6"/>
                    <ellipse cx="12" cy="12" rx="4" ry="3"/>
                  </svg>
                  <span class="item-name">Ягодицы</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Secondary Muscles -->
          <div class="form-group">
            <label class="form-label">Вторичные мышцы</label>
            <p class="form-hint">Выберите мышцы, которые также задействованы</p>
            <div class="selector-grid multi" id="secondaryMuscleSelector">
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="chest" id="sec-chest">
                <label for="sec-chest">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 4c-3 0-6 2-6 6v6c0 2 1 4 6 4s6-2 6-4v-6c0-4-3-6-6-6z"/>
                  </svg>
                  <span class="item-name">Грудные</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="shoulders" id="sec-shoulders" checked>
                <label for="sec-shoulders">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="6" r="4"/>
                    <path d="M4 20h16M8 14l4-4 4 4"/>
                  </svg>
                  <span class="item-name">Плечи</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="triceps" id="sec-triceps" checked>
                <label for="sec-triceps">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="12" rx="6" ry="3"/>
                    <path d="M6 8v8c0 2 2.69 4 6 4s6-2 6-4V8"/>
                  </svg>
                  <span class="item-name">Трицепс</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="back" id="sec-back">
                <label for="sec-back">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2v20M4 6h16M4 10h16M4 14h16M4 18h16"/>
                  </svg>
                  <span class="item-name">Спина</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="biceps" id="sec-biceps">
                <label for="sec-biceps">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="12" rx="6" ry="3"/>
                    <path d="M6 12v4c0 2 2.69 4 6 4s6-2 6-4v-4"/>
                  </svg>
                  <span class="item-name">Бицепс</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="legs" id="sec-legs">
                <label for="sec-legs">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="6" r="2"/>
                    <circle cx="16" cy="6" r="2"/>
                    <line x1="8" y1="8" x2="8" y2="20"/>
                    <line x1="16" y1="8" x2="16" y2="20"/>
                  </svg>
                  <span class="item-name">Ноги</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="core" id="sec-core">
                <label for="sec-core">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="6" y="4" width="12" height="16" rx="2"/>
                    <line x1="6" y1="8" x2="18" y2="8"/>
                    <line x1="6" y1="12" x2="18" y2="12"/>
                    <line x1="6" y1="16" x2="18" y2="16"/>
                  </svg>
                  <span class="item-name">Пресс</span>
                </label>
              </div>
              <div class="selector-item">
                <input type="checkbox" name="secondary-muscle" value="glutes" id="sec-glutes">
                <label for="sec-glutes">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="12" rx="8" ry="6"/>
                    <ellipse cx="12" cy="12" rx="4" ry="3"/>
                  </svg>
                  <span class="item-name">Ягодицы</span>
                </label>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const saveBtn = document.getElementById('saveBtn');
      
      saveBtn.addEventListener('click', () => {
        const formData = {
          name: document.getElementById('exerciseName').value,
          equipment: document.querySelector('input[name="equipment"]:checked')?.value,
          primaryMuscle: document.querySelector('input[name="primary-muscle"]:checked')?.value,
          secondaryMuscles: Array.from(document.querySelectorAll('input[name="secondary-muscle"]:checked')).map(cb => cb.value)
        };
        
        console.log('Saving exercise:', formData);
        
        // Show success
        const originalHTML = saveBtn.innerHTML;
        saveBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Сохранено!
        `;
        saveBtn.disabled = true;
        
        setTimeout(() => {
          saveBtn.innerHTML = originalHTML;
          saveBtn.disabled = false;
        }, 2000);
      });
    });
  </script>
</body>
</html>
