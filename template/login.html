<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — FitApp</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="index.html" class="auth-logo">FitApp</a>
      
      <div class="auth-card">
        <h1 class="auth-title">Вход</h1>
        <p class="auth-subtitle">Войдите в свой аккаунт для доступа к программам</p>
        
        <form class="auth-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" placeholder="Ваш email" required>
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg">Войти</button>
        </form>
        
        <p class="auth-footer-text">
          Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
